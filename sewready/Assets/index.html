function render() {
  document.getElementById('shops').innerHTML = SHOPS.map((s, i) => `
    <div class="shop-section" data-name="${s.name.toLowerCase()}">
      <div class="shop-name">${s.name}</div>
      <div class="colors">${s.colors.map(c => `<div class="color-dot" style="background:${c}"></div>`).join('')}</div>
      
      <div class="prompt-row">
        <div class="prompt-label">MIDJOURNEY</div>
        <div class="prompt-box">${s.mj_hero}</div>
        <button class="copy-btn" onclick="copy(this, s.mj_hero)">Copy</button>
      </div>
      
      <div class="prompt-row">
        <div class="prompt-label">LOGO</div>
        <div class="prompt-box">${s.mj_logo}</div>
        <button class="copy-btn" onclick="copy(this, s.mj_logo)">Copy</button>
      </div>
      
      <div class="prompt-row">
        <div class="prompt-label">VIDEO</div>
        <div class="prompt-box">${s.video}</div>
        <button class="copy-btn" onclick="copy(this, s.video)">Copy</button>
      </div>
      
      <div class="prompt-row">
        <div class="prompt-label">HEYGEN</div>
        <div class="prompt-box">${s.heygen}</div>
        <button class="copy-btn" onclick="copy(this, s.heygen)">Copy</button>
      </div>
    </div>
  `).join('');
}

function copy(btn, text) {
  navigator.clipboard.writeText(text);
  btn.textContent = '✓ Copied';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

function copyAllMJ() {
  var all = SHOPS.map(s => s.mj_hero).join('\n\n');
  navigator.clipboard.writeText(all);
  alert('All Midjourney prompts copied!');
}

function copyAllHeygen() {
  var all = SHOPS.map(s => s.heygen).join('\n\n---\n');
  navigator.clipboard.writeText(all);
  alert('All HeyGen scripts copied!');
}

function filter() {
  var q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.shop-section').forEach(el => {
    el.classList.toggle('hidden', !el.dataset.name.includes(q));
  });
}

render();
</script>
