<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing In — Ranger Beers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-callback { text-align: center; padding: 40px 24px; max-width: 420px; }
        .auth-callback h1 { color: #C5B358; font-size: 28px; margin-bottom: 8px; }
        .auth-callback .subtitle { color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
        .auth-card { background: #0a0a0a; border: 1px solid rgba(197, 179, 88, 0.2); border-radius: 12px; padding: 32px; }
        #auth-status { color: #aaa; font-size: 16px; line-height: 1.6; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid rgba(197, 179, 88, 0.3); border-top-color: #C5B358; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-callback">
        <h1>Ranger Beers</h1>
        <div class="subtitle">Army School Supply Co.</div>
        <div class="auth-card">
            <div class="spinner"></div>
            <div id="auth-status">Verifying your login...</div>
        </div>
    </div>
    <script src="../course-auth.js"></script>
    <script>RangerAuth.handleAuthCallback();</script>
</body>
</html>
